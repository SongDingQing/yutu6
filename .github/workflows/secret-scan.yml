name: secret-scan
# CI 硬约束:GitHub 侧每次 push / PR 都跑密钥扫描,error 即红叉。
# 这是最后一层"服务器端"闸门 —— 本地钩子可被 --no-verify / 未启用 hooksPath 绕过,
# 但打到 GitHub 的内容一律在这里复查,并可配为分支保护的必需检查。
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (全历史,便于范围扫描)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 扫描本次 push 新增内容(增量)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if git cat-file -e "$BEFORE" 2>/dev/null; then
            node security/secret-scan.js --range "${BEFORE}..${AFTER}"
          else
            node security/secret-scan.js --tracked
          fi
      - name: 扫描 HEAD 全量已跟踪文件(兜底)
        run: node security/secret-scan.js --tracked
