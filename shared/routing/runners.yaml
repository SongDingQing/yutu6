# 玉兔6 通用 Runner 注册表
schema_version: 2
updated_at: 2026-07-14

runners:
  - id: codex
    name: OpenAI Codex
    klass: first_class
    kind: cli
    command: [codex, exec, --sandbox, danger-full-access, --skip-git-repo-check]
    auth: local_cli_login
    capabilities: [planning, local_file_edits, command_execution, tests_builds, code_review]

  - id: codex-privileged
    name: OpenAI Codex Privileged
    klass: first_class
    kind: cli
    command: [codex, exec, --dangerously-bypass-approvals-and-sandbox, --skip-git-repo-check]
    auth: local_cli_login
    capabilities: [repair, service_restart, local_file_edits, command_execution, desktop_control]
    safeguards: [owner_confirmation_for_irreversible_actions, no_secret_echo]

  - id: claude
    name: Claude Code Optional
    klass: first_class
    kind: cli
    command: [claude, -p, --dangerously-skip-permissions]
    auth: optional_local_cli_login
    capabilities: [planning, review, local_file_edits, command_execution]

  - id: claude-fable-5
    name: Claude Fable 5 Optional Board Director
    klass: first_class
    kind: cli
    command: [claude, -p, --model, claude-fable-5, --dangerously-skip-permissions]
    auth: optional_local_cli_login
    capabilities: [architecture_review, risk_assessment]

  - id: zhipu-glm
    name: Zhipu Coding Plan
    klass: first_class
    kind: openai_http
    env: [ZHIPU_API_KEY, ZHIPU_BASE_URL, ZHIPU_MODEL]
    capabilities: [planning, review, structured_output]

  - id: deepseek
    name: DeepSeek
    klass: first_class
    kind: openai_http
    env: [DEEPSEEK_API_KEY, DEEPSEEK_BASE_URL, DEEPSEEK_MODEL]
    capabilities: [architecture_review, risk_assessment]

  - id: minimax
    name: MiniMax
    klass: first_class
    kind: anthropic_http
    env: [MINIMAX_API_KEY, MINIMAX_BASE_URL, MINIMAX_MODEL]
    capabilities: [planning, review, conversation]

  - id: peekaboo
    name: Peekaboo
    klass: first_class
    kind: cli_and_mcp
    command: [peekaboo]
    capabilities: [screenshot, click, type, scroll, visual_qa]
    permissions_required: [screen_recording, accessibility]

  - id: local-script
    name: Local Deterministic Script
    klass: first_class
    kind: script
    capabilities: [zero_token_automation]

policy:
  authority: task_and_result_envelopes
  secret_source: ~/.config/yutu6/providers.env
  setup_gate: at_least_one_executor_model
  project_agents: generated_per_project_department
