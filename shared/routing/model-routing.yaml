# 玉兔6 · 模型路由表(声明式 / 零 token 确定性路由)
# 依据:多智能体架构设计 §5(多模型接入)、§18.4(per-agent + 预测性故障转移)
# 编排层只读这张表选 provider/模型,本身不调模型、不烧 token。
schema_version: 1
updated_at: 2026-07-20

# ── 统一出口与三路兜底链(订阅 → API → 本地 Ollama)──────────────
providers:
  subscription:                 # 吃性价比,优先
    codex:  { via: codex-cli,   models: [gpt-5.6-sol] }
  api:                          # 稳、可预测,兜底第二层
    openai:    { env: OPENAI_API_KEY,    models: [gpt-5, gpt-5-mini] }
    deepseek:  { via: new-api,           models: [deepseek-chat, deepseek-reasoner] }
    zhipu:     { via: coding-plan-direct, models: [glm-5.2, glm-5] }
    kimi:      { via: new-api, env: KIMI_API_KEY, models: [k3] }
  local:                        # 离线 / 降本,最后兜底(5090 / mini)
    ollama: { host_env: OLLAMA_HOST, default: "http://localhost:11434", models: [qwen2.5, nomic-embed-text] }

# ── 故障转移:429/5xx/超时/不可用 → 顺 chain 走;余量低于阈值即预测性提前切 ──
failover:
  triggers: [http_429, http_5xx, timeout, model_unavailable, quota_low]
  predictive: true              # 把"剩余限流余量"当路由信号,耗尽前提前切,不被动 fallback
  chain: [subscription, api, local]

# ── 分层 / 分角色选模型(判断层强模型,执行层快省模型)────────────
roles:
  secretary:                    # 秘书:前门补全与路由,不直接执行项目细节;由 Codex/GPT-5.6-Sol 执行
    tier: strong
    prefer: [subscription.codex, api.zhipu.glm-5.2]
    context_mode: last_only
  orchestrator:                 # 总管:拆项目、压缩趋势、消歧 —— 强模型
    tier: strong
    prefer: [subscription.codex, api.openai.gpt-5, api.zhipu.glm-5.2]
    context_mode: accumulate    # 仅总管级可全量
  supervisor:                   # 主管:单项目规划 / 审产物 —— 强模型
    tier: strong
    prefer: [subscription.codex, api.openai.gpt-5, api.zhipu.glm-5.2]
    context_mode: explicit
  magicmushroom_supervisor:     # MagicMushroom 专属主管:Unity 6 规划与硬复审
    tier: strong
    prefer: [subscription.codex, api.openai.gpt-5, api.zhipu.glm-5.2]
    context_mode: explicit
  reasoning_architect:          # 复杂架构 / 风险 / 复盘仲裁 —— 按协作契约优先 Codex
    tier: strong
    prefer: [subscription.codex, api.openai.gpt-5]
    context_mode: explicit
  worker_code:                  # 后端程序员 / 写码 / 构建 / 测试 —— Codex 主力,GLM 仅作后续可验证候选
    tier: exec
    prefer: [subscription.codex, api.zhipu.glm-5.2, api.openai.gpt-5]
    execution: { requires_tool_capable_for_delivery: true, pure_text_runner_policy: reject_or_harness }
    context_mode: explicit
  magicmushroom_programmer:     # MagicMushroom 专属 Unity 6 落盘执行
    tier: exec
    prefer: [subscription.codex, api.openai.gpt-5]
    execution: { requires_tool_capable_for_delivery: true, pure_text_runner_policy: reject_or_harness }
    context_mode: explicit
  worker_narrow:                # 外包员工 / 轻量 / 省钱 / 离线 —— Haiku 或本地
    tier: cheap
    prefer: [api.zhipu.glm-5.2, local.ollama.qwen2.5, subscription.codex]
    execution: { requires_tool_capable_for_delivery: true, pure_text_runner_policy: auto_harness }
    context_mode: last_only
  insight-scout:                # 洞察员:定时优秀案例/开源项目扫描来源标识
    tier: cheap
    prefer: [api.zhipu.glm-5.2, subscription.codex]
    context_mode: explicit
  quality_ops:                  # 质量运营工程师(§16 硬化)—— 读事件日志找重复确定性动作
    tier: standard
    prefer: [api.zhipu.glm-5.2, subscription.codex]
    execution: { requires_tool_capable_for_delivery: true, pure_text_runner_policy: auto_harness }
    context_mode: explicit      # 只看事件日志/ledger,不看项目细节
  governance:                   # 监管人员(§17 复盘防复发)—— 读误区库 + attempt 计数
    tier: strong
    prefer: [subscription.codex, api.zhipu.glm-5.2]
    context_mode: explicit
  board_deepseek:               # 董事会 DeepSeek:重要架构挑刺
    tier: strong
    prefer: [api.deepseek.deepseek-chat]
    context_mode: explicit
  board_glm52:                  # 董事会 GLM-5.2:低成本主力挑刺
    tier: standard
    prefer: [api.zhipu.glm-5.2]
    context_mode: explicit
  board_kimi:                   # 董事会 Kimi K3:代码/Agent 链路与长上下文遗漏审查
    tier: strong
    prefer: [api.kimi.k3]
    context_mode: explicit
  board_gpt55:                  # 兼容旧别名:不再作为活跃董事;GPT-5.6-Sol 视角并入 board_opus48
    tier: strong
    prefer: [subscription.codex]
    context_mode: explicit
    deprecated: true
    alias_of: board_opus48
  board_opus48:                 # 历史兼容槽位:最终误判风险裁决,现为唯一 Codex/GPT-5.6-Sol 董事
    tier: strong
    prefer: [subscription.codex]
    context_mode: explicit
  ui_optimizer:                 # 系统级 UI 自我优化师 —— Peekaboo 看页面,Codex 挑错并修
    tier: strong
    prefer: [subscription.codex, api.zhipu.glm-5.2]
    rollout: { default_percent: 100, env_override: UI_OPTIMIZER_CODEX_ROLLOUT_PERCENT, rollback_env: UI_OPTIMIZER_CODEX_ENABLED=0, rollback_prefer: [subscription.codex] }
    context_mode: explicit      # 只看 UI 页面/截图/挑错报告,不碰业务
  frontend_designer:            # 控制台专属前端程序员 —— workspace.html/UI 定位与改造方案
    tier: standard
    prefer: [api.zhipu.glm-5.2, subscription.codex]
    execution: { requires_tool_capable_for_delivery: true, pure_text_runner_policy: auto_harness }
    context_mode: explicit
  hr_manager:                   # HR 主管 —— agent 招聘/入职/边界审核把关
    tier: strong
    prefer: [subscription.codex, api.zhipu.glm-5.2]
    context_mode: explicit
  hr_specialist:                # HR 专员 —— 按批准规格执行模板/注册/smoke
    tier: standard
    prefer: [api.zhipu.glm-5.2]
    execution: { requires_tool_capable_for_delivery: true, pure_text_runner_policy: auto_harness }
    context_mode: explicit
  repair:                       # 维修员 —— 特权 Codex 救火/服务修复
    tier: strong
    prefer: [subscription.codex]
    context_mode: explicit
  repair-lead:                  # 维修主管 —— Codex 特权 runner 根因分析/分级/派工/复核
    tier: strong
    prefer: [subscription.codex]
    execution: { requires_tool_capable_for_delivery: true, privileged_channel: true, delegates_to: repair, high_risk_requires_owner_confirmation: true }
    context_mode: explicit
  gui_desktop_control:          # 桌面控制:Codex 特权 runner 调 Peekaboo 截图/点击/视觉验收执行
    tier: exec
    prefer: [subscription.codex]
    context_mode: explicit
  memory_officer:               # 记忆官 —— 任务完成后提炼长期记忆
    tier: standard
    prefer: [subscription.codex, api.zhipu.glm-5.2]
    context_mode: explicit
  it_engineer:                  # IT 工程师 —— 四段版本号 / Gitee push / 安全回滚 —— GLM-5.2 主力,Codex secondary
    tier: strong
    prefer: [api.zhipu.glm-5.2, subscription.codex]
    execution: { requires_tool_capable_for_delivery: true, pure_text_runner_policy: auto_harness, high_risk_requires_owner_confirmation: true }
    context_mode: explicit
  embedding:                    # 知识库向量(§15)—— 本地 768 维
    prefer: [local.ollama.nomic-embed-text]

# ── 默认上下文可见性:从严(§18.3 把 §3 need-to-know 落到节点级)──
context_defaults:
  visibility: explicit          # explicit(默认)/ last_only / accumulate(仅总管)
  stable_prefix: true           # §18.5 稳定前缀吃 KV-cache;易变内容放后段
  inject_agents_md: true        # 发现 AGENTS.md / CLAUDE.md → 作常驻记忆注入稳定前缀
