schema_version: 1
id: review-loop
guards:
  max_loops: 3
  wall_timeout_sec: 7200
nodes:
  - { id: implement, agent_role: worker_code }
  - { id: review, agent_role: supervisor }
  - { id: human, type: human_gate }
  - { id: done, type: end }
edges:
  - { from: implement, to: review }
  - { from: review, to: human, when: "{{ review.routing == 'manual_review' or review.routing == 'loop_limit' }}" }
  - { from: review, to: implement, when: "{{ review.routing == 'rework' and review.pass == false and loop < max_loops }}" }
  - { from: review, to: done, when: "{{ review.routing == 'approve' and review.pass == true and review.verdict == 'pass' }}" }
  - { from: human, to: implement, when: "{{ human.decision == 'revise' }}" }
  - { from: human, to: done, when: "{{ human.decision == 'approve' }}" }
on_no_edge: planner
acceptance:
  require_evidence: true
