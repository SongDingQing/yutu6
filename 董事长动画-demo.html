<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>玉兔6 · 董事长动画 Demo</title>
<style>
:root{--line:rgba(120,140,160,.3);--text:#e8eef5;--accent:#6ea8fe;--gold:#d6b56d;--green:#46d39a}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 50% 26%,#1a2329,#0c1113);color:var(--text);font-family:-apple-system,system-ui,"PingFang SC",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:26px}
h1{font-size:18px;font-weight:800;letter-spacing:1px;margin:0 0 4px}
.sub{font-size:12px;color:#8a97a5;margin-bottom:20px}
.stage{position:relative;width:700px;max-width:94vw;height:390px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:linear-gradient(180deg,#26313a 0 40%,#1b2429 40% 62%,#0f1518 62% 100%);box-shadow:inset 0 2px 0 rgba(255,255,255,.05),0 20px 50px rgba(0,0,0,.45)}
.stage::before{content:"";position:absolute;left:0;right:0;top:0;height:40%;background:repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 1px,transparent 1px 62px);pointer-events:none}
.floor{position:absolute;left:0;right:0;bottom:0;height:38%;background:repeating-linear-gradient(90deg,rgba(214,181,109,.06) 0 1px,transparent 1px 56px),repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0 1px,transparent 1px 30px)}
.door{position:absolute;right:30px;bottom:38%;width:66px;height:124px;border:2px solid rgba(180,150,90,.4);border-bottom:none;border-radius:6px 6px 0 0;background:linear-gradient(180deg,rgba(40,52,60,.6),rgba(25,33,38,.6));box-shadow:inset 0 0 22px rgba(0,0,0,.45)}
.door::after{content:"";position:absolute;left:9px;top:52%;width:6px;height:6px;border-radius:50%;background:var(--gold)}
.desk{position:absolute;left:150px;bottom:30%;width:188px;height:56px;border-radius:8px 8px 4px 4px;background:linear-gradient(180deg,#5a4632,#3a2c1e);box-shadow:0 12px 22px rgba(0,0,0,.42),inset 0 2px 0 rgba(255,220,160,.15)}
.desk::before{content:"";position:absolute;left:18px;top:-15px;width:42px;height:15px;border-radius:3px;background:linear-gradient(180deg,#cdd6df,#8b96a0);box-shadow:0 3px 6px rgba(0,0,0,.3)}
.actor{position:absolute;bottom:30%;width:98px;height:124px}
.actor img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 8px 8px rgba(0,0,0,.35))}
#chairman{left:166px}
#chairman.work{animation:chWork 3.2s ease-in-out infinite}
@keyframes chWork{0%,100%{transform:translateY(0)}22%{transform:translateY(-3px)}48%{transform:translateY(0) rotate(-1.6deg)}72%{transform:translateY(-2px) rotate(.6deg)}}
#secretary{left:700px;opacity:0}
#secretary.enter{animation:secEnter 1.6s ease-out forwards,secWalk .42s ease-in-out 8}
#secretary.leave{animation:secLeave 1.6s ease-in forwards,secWalk .42s ease-in-out 8}
@keyframes secEnter{0%{left:700px;opacity:0}12%{opacity:1}100%{left:320px;opacity:1}}
@keyframes secLeave{0%{left:320px;opacity:1}100%{left:700px;opacity:0}}
@keyframes secWalk{50%{transform:translateY(-5px)}}
.bubble{position:absolute;padding:7px 12px;border-radius:12px;background:#fff;color:#1a2228;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transform:translateY(6px) scale(.85);transition:all .25s;box-shadow:0 6px 16px rgba(0,0,0,.3);z-index:9}
.bubble::after{content:"";position:absolute;left:18px;bottom:-6px;border:6px solid transparent;border-top-color:#fff}
.bubble.show{opacity:1;transform:translateY(0) scale(1)}
#bubChair{left:168px;bottom:66%}
#bubSec{left:300px;bottom:64%}
.taskcard{position:absolute;left:220px;bottom:52%;padding:5px 10px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#4a7fd6);color:#fff;font-size:12px;font-weight:700;opacity:0;z-index:8;box-shadow:0 6px 14px rgba(110,168,254,.5)}
.taskcard.fly{animation:taskFly 1.1s ease-in-out forwards}
@keyframes taskFly{0%{opacity:0;left:220px;bottom:52%}22%{opacity:1}100%{opacity:1;left:330px;bottom:47%}}
.controls{margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
button{font:inherit;font-size:14px;font-weight:600;padding:10px 20px;border-radius:10px;border:1px solid var(--line);background:#1c2530;color:var(--text);cursor:pointer;transition:.15s}
button:hover{background:#26313d;border-color:var(--accent)}
button.primary{background:linear-gradient(135deg,var(--accent),#4a7fd6);border:none;color:#fff}
.status{margin-top:14px;font-size:13px;color:var(--gold);height:18px}
</style>
</head>

  setTimeout(()=>{hide(bubChair);sec.classList.add('enter');statusEl.textContent='秘书进来了…';},1200);
  setTimeout(()=>{show(bubChair,'这个任务交给你');task.classList.add('fly');statusEl.textContent='董事长传递任务…';},3200);
  setTimeout(()=>{hide(bubChair);show(bubSec,'收到!');statusEl.textContent='秘书接下任务';},4500);
  setTimeout(()=>{hide(bubSec);task.classList.remove('fly');task.style.opacity=0;sec.classList.remove('enter');sec.classList.add('leave');statusEl.textContent='秘书去执行了…';},5700);
  setTimeout(()=>{sec.classList.remove('leave');task.style.opacity='';busy=false;statusEl.textContent='董事长正在办公…';},7500);
}
playOffice();
</script>
